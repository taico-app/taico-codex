name: Build and Deploy

on:
  pull_request:
    branches:
      - main
      - feature/**
  push:
    branches:
      - main
  release:
    types:
      - published

jobs:
  test:
    name: Build and Test
    runs-on: ubuntu-24.04-arm

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Set up Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '24'
          cache: 'npm'
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Restore nx cache
        uses: actions/cache@v4
        with:
          path: .nx/cache
          key: nx-${{ runner.os }}-${{ github.sha }}
          restore-keys: |
            nx-${{ runner.os }}-

      - name: Build everything (cached via nx)
        run: npm run build:prod

      - name: Run openapi-sdkgen tests
        run: npx nx run @taico/openapi-sdkgen:test

      - name: Run E2E tests
        id: tests
        run: npm -w apps/backend run test:e2e

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v5
        with:
          name: test-results
          path: apps/backend/test-results/
          retention-days: 30
          if-no-files-found: ignore

      - name: Show logs on failure
        if: failure() && steps.tests.outcome == 'failure'
        run: |
          echo "==================================="
          echo "Test execution failed!"
          echo "==================================="
          echo ""
          echo "Check the test output above for details."
          echo "You can also download the test-results artifact for more information."

  docker:
    name: Build and Push Docker Image
    runs-on: ubuntu-24.04-arm
    needs: test
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata for Docker
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=ref,event=branch
            type=sha,prefix={{branch}}-
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}
          labels: |
            org.opencontainers.image.source.branch=${{ github.ref_name }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          platforms: linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  docker-release-tag:
    name: Tag existing image with release tag
    runs-on: ubuntu-24.04-arm
    needs: test
    if: github.event_name == 'release'
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout release commit
        uses: actions/checkout@v5
        with:
          ref: ${{ github.event.release.tag_name }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute source image tag
        id: vars
        run: |
          SHORT_SHA=$(git rev-parse --short=7 HEAD)
          echo "short_sha=${SHORT_SHA}" >> "$GITHUB_OUTPUT"
          echo "release_tag=${{ github.event.release.tag_name }}" >> "$GITHUB_OUTPUT"
          echo "source_tag=main-${SHORT_SHA}" >> "$GITHUB_OUTPUT"

      - name: Promote existing image to release tag
        run: |
          docker buildx imagetools create \
            --tag ghcr.io/${{ github.repository }}:${{ steps.vars.outputs.release_tag }} \
            ghcr.io/${{ github.repository }}:${{ steps.vars.outputs.source_tag }}

  deploy-pr:
    name: Copy Manifests to spark-ops
    runs-on: ubuntu-24.04-arm
    needs: docker
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    permissions:
      contents: read

    steps:
      - name: Checkout ai-monorepo
        uses: actions/checkout@v5
        with:
          path: ai-monorepo

      - name: Checkout spark-ops
        uses: actions/checkout@v5
        with:
          repository: galarzafrancisco/spark-ops
          token: ${{ secrets.SPARK_OPS_TOKEN }}
          path: spark-ops

      - name: Setup Kustomize
        uses: imranismail/setup-kustomize@v2

      - name: Extract image tag
        id: image-tag
        run: |
          SHORT_SHA=$(echo $GITHUB_SHA | cut -c1-7)
          TAG="main-${SHORT_SHA}"
          echo "tag=${TAG}" >> $GITHUB_OUTPUT
          echo "sha=${SHORT_SHA}" >> $GITHUB_OUTPUT

      - name: Copy manifests to spark-ops
        run: |
          # Remove old manifests if they exist
          rm -rf spark-ops/k8s/taico

          # Copy entire manifests directory
          mkdir -p spark-ops/k8s
          cp -r ai-monorepo/install/manifests spark-ops/k8s/taico

          # Update image tag in deployment.yaml
          cd spark-ops/k8s/taico/base

          # Use kustomize to set image tag
          kustomize edit set image ghcr.io/galarzafrancisco/ai-monorepo=ghcr.io/galarzafrancisco/ai-monorepo:${{ steps.image-tag.outputs.tag }}

      - name: Create Pull Request
        uses: peter-evans/create-pull-request@v6
        with:
          token: ${{ secrets.SPARK_OPS_TOKEN }}
          path: spark-ops
          commit-message: |
            deploy: update taico manifests and image to ${{ steps.image-tag.outputs.tag }}

            Source: ${{ github.repository }}@${{ github.sha }}
            Build: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}

          branch: deploy/taico-${{ steps.image-tag.outputs.sha }}
          delete-branch: true
          title: "Deploy taico (${{ steps.image-tag.outputs.tag }})"
          body: |
            ## Deployment Update

            **Service**: taico
            **Image Tag**: `${{ steps.image-tag.outputs.tag }}`
            **Source Commit**: ${{ github.sha }}

            ### Changes
            - Copied latest manifests from `install/manifests/`
            - Updated image tag to `${{ steps.image-tag.outputs.tag }}`

            ### Build Information
            - **Build Run**: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
            - **Image**: `ghcr.io/${{ github.repository }}:${{ steps.image-tag.outputs.tag }}`

            ---
            *This PR will be automatically validated and merged by spark-ops workflow.*

          labels: |
            automated-deployment
            taico