apiVersion: apps/v1
kind: Deployment
metadata:
  name: taico-codex
  namespace: taico-codex
  labels:
    app: taico-codex
spec:
  replicas: 1
  selector:
    matchLabels:
      app: taico-codex
  template:
    metadata:
      labels:
        app: taico-codex
    spec:
      containers:
      - name: taico-codex
        image: ghcr.io/taico-app/taico-codex:123
        ports:
        - containerPort: 3000
          name: http
          protocol: TCP
        envFrom:
        - configMapRef:
            name: taico-codex-config
        volumeMounts:
        - name: data
          mountPath: /app/data
        resources:
          requests:
            memory: "256Mi"
            cpu: "100m"
          limits:
            memory: "1Gi"
            cpu: "1000m"
        livenessProbe:
          httpGet:
            path: /
            port: 3000
          initialDelaySeconds: 30
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /
            port: 3000
          initialDelaySeconds: 10
          periodSeconds: 5
      volumes:
      - name: data
        hostPath:
          path: /var/lib/persistent/codex-taico
          type: DirectoryOrCreate
