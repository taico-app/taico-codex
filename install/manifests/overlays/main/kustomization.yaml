apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

configMapGenerator:
  - name: env
    envs:
      - env.env

resources:
- ../../base

replacements:
  # Replace STORAGE_PATH in volume hostPath
  - source:
      kind: ConfigMap
      name: env
      fieldPath: data.STORAGE_PATH
    targets:
      - select:
          kind: Deployment
          name: taico
        fieldPaths:
          - spec.template.spec.volumes.[name=data].hostPath.path
  # Replace ISSUER_URL in taico-config ConfigMap
  - source:
      kind: ConfigMap
      name: env
      fieldPath: data.ISSUER_URL
    targets:
      - select:
          kind: ConfigMap
          name: taico-config
        fieldPaths:
          - data.ISSUER_URL
  # Replace GOOGLE_GENAI_USE_VERTEXAI in taico-config ConfigMap
  - source:
      kind: ConfigMap
      name: env
      fieldPath: data.GOOGLE_GENAI_USE_VERTEXAI
    targets:
      - select:
          kind: ConfigMap
          name: taico-config
        fieldPaths:
          - data.GOOGLE_GENAI_USE_VERTEXAI
  # Replace GOOGLE_CLOUD_PROJECT in taico-config ConfigMap
  - source:
      kind: ConfigMap
      name: env
      fieldPath: data.GOOGLE_CLOUD_PROJECT
    targets:
      - select:
          kind: ConfigMap
          name: taico-config
        fieldPaths:
          - data.GOOGLE_CLOUD_PROJECT
  # Replace GOOGLE_CLOUD_LOCATION in taico-config ConfigMap
  - source:
      kind: ConfigMap
      name: env
      fieldPath: data.GOOGLE_CLOUD_LOCATION
    targets:
      - select:
          kind: ConfigMap
          name: taico-config
        fieldPaths:
          - data.GOOGLE_CLOUD_LOCATION
  # Replace GOOGLE_APPLICATION_CREDENTIALS in taico-config ConfigMap
  - source:
      kind: ConfigMap
      name: env
      fieldPath: data.GOOGLE_APPLICATION_CREDENTIALS
    targets:
      - select:
          kind: ConfigMap
          name: taico-config
        fieldPaths:
          - data.GOOGLE_APPLICATION_CREDENTIALS