apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

configMapGenerator:
  - name: env
    envs:
      - env.env

resources:
- ../../base

replacements:
  # Replace GOOGLE_GENAI_USE_VERTEXAI in taico-config ConfigMap
  - source:
      kind: ConfigMap
      name: env
      fieldPath: data.GOOGLE_GENAI_USE_VERTEXAI
    targets:
      - select:
          kind: ConfigMap
          name: taico-codex-config
        fieldPaths:
          - data.GOOGLE_GENAI_USE_VERTEXAI
  # Replace GOOGLE_CLOUD_PROJECT in taico-codex-config ConfigMap
  - source:
      kind: ConfigMap
      name: env
      fieldPath: data.GOOGLE_CLOUD_PROJECT
    targets:
      - select:
          kind: ConfigMap
          name: taico-codex-config
        fieldPaths:
          - data.GOOGLE_CLOUD_PROJECT
  # Replace GOOGLE_CLOUD_LOCATION in taico-codex-config ConfigMap
  - source:
      kind: ConfigMap
      name: env
      fieldPath: data.GOOGLE_CLOUD_LOCATION
    targets:
      - select:
          kind: ConfigMap
          name: taico-codex-config
        fieldPaths:
          - data.GOOGLE_CLOUD_LOCATION
  # Replace GOOGLE_APPLICATION_CREDENTIALS in taico-codex-config ConfigMap
  - source:
      kind: ConfigMap
      name: env
      fieldPath: data.GOOGLE_APPLICATION_CREDENTIALS
    targets:
      - select:
          kind: ConfigMap
          name: taico-codex-config
        fieldPaths:
          - data.GOOGLE_APPLICATION_CREDENTIALS