apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

configMapGenerator:
  - name: env
    envs:
      - env.env

resources:
- ../../base

replacements:
  # Replace STORAGE_PATH in volume hostPath
  - source:
      kind: ConfigMap
      name: env
      fieldPath: data.STORAGE_PATH
    targets:
      - select:
          kind: Deployment
          name: taico
        fieldPaths:
          - spec.template.spec.volumes.[name=data].hostPath.path
  # Replace ADK_URL in taico-config ConfigMap
  - source:
      kind: ConfigMap
      name: env
      fieldPath: data.ADK_URL
    targets:
      - select:
          kind: ConfigMap
          name: taico-config
        fieldPaths:
          - data.ADK_URL
  # Replace OLLAMA_URL in taico-config ConfigMap
  - source:
      kind: ConfigMap
      name: env
      fieldPath: data.OLLAMA_URL
    targets:
      - select:
          kind: ConfigMap
          name: taico-config
        fieldPaths:
          - data.OLLAMA_URL
  # Replace ISSUER_URL in taico-config ConfigMap
  - source:
      kind: ConfigMap
      name: env
      fieldPath: data.ISSUER_URL
    targets:
      - select:
          kind: ConfigMap
          name: taico-config
        fieldPaths:
          - data.ISSUER_URL
  # Replace OPENAI_KEY in taico-secrets Secret
  - source:
      kind: ConfigMap
      name: env
      fieldPath: data.OPENAI_KEY
    targets:
      - select:
          kind: Secret
          name: taico-secrets
        fieldPaths:
          - stringData.OPENAI_KEY